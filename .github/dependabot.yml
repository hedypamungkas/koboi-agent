# Dependabot keeps dependencies and GitHub Actions current.
# - github-actions: bumps the SHA-pinned actions (see `# <ver>` comments in the
#   workflows). Pinning to a commit SHA is the supply-chain best practice; this
#   ecosystem entry is what keeps those SHAs from going stale.
# - pip: bumps Python dependencies declared in pyproject.toml (incl. extras).
# Weekly cadence, grouped per ecosystem to keep PR noise low. Security advisories
# still open immediately, regardless of schedule.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      - dependency-name: "langfuse"
        # koboi's LangfuseTracingHook targets the Langfuse SDK v2 API
        # (client.trace().span().generation() fluent chain + Langfuse(publicKey=,
        # host=) constructor), which langfuse v3 removed. Pin below v3 until the
        # hook is migrated to the v3/v4 SDK.
        #
        # `versions: [">=3.0"]` is the load-bearing rule: it blocks BOTH a normal
        # major bump AND a requirement-cap-widening PR (the `<3.0` -> `<5.0` kind
        # that Dependabot opened as #39 and #14 despite the rule below). The
        # `update-types` entry alone does NOT gate cap-widening — keep both.
        versions: [">=3.0"]
        update-types: ["version-update:semver-major"]
