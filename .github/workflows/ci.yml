name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"
          pip install ruff "mypy~=1.19.1"

      - name: Ruff lint
        run: |
          ruff check koboi/ --select E,F,W --ignore E501,E402

      - name: Ruff format check
        run: |
          ruff format --check koboi/

      - name: Type check with mypy
        run: |
          mypy koboi/ --ignore-missing-imports --no-strict-optional

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"

      - name: Run tests with coverage
        run: |
          pytest --tb=short -q --cov=koboi --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"
          pip install pip-audit bandit

      - name: Dependency audit
        run: |
          pip-audit
        continue-on-error: true

      - name: Static security analysis
        run: |
          bandit -r koboi/ -c pyproject.toml
