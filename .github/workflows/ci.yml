name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"
          pip install ruff "mypy~=1.19.1"

      - name: Ruff lint
        run: |
          ruff check koboi/ --select E,F,W --ignore E501,E402

      - name: Ruff format check
        run: |
          ruff format --check koboi/

      - name: Type check with mypy
        run: |
          mypy koboi/ --ignore-missing-imports --no-strict-optional

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"

      - name: Run tests with coverage
        run: |
          pytest --tb=short -q --cov=koboi --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"
          pip install pip-audit bandit

      - name: Dependency audit
        run: |
          pip-audit
        continue-on-error: true

      - name: Static security analysis
        run: |
          bandit -r koboi/ -c pyproject.toml

  seccomp:
    # Validates HARD network isolation (sandbox.network_isolation: seccomp). The
    # libseccomp Python bindings are a SYSTEM package (not on PyPI), so use the
    # runner's system python3 + apt `python3-seccomp`. A venv with
    # --system-site-packages inherits the bindings; its interpreter ABI-matches
    # the system .so (both are the runner's python3).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system python3-seccomp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-seccomp python3-venv

      - name: Verify seccomp importable (guard against a false-green skip)
        run: python3 -c "import seccomp; print('seccomp module:', seccomp.__file__)"

      - name: Install koboi [dev] in a venv that inherits system site-packages
        run: |
          python3 -m venv --system-site-packages /tmp/v
          /tmp/v/bin/pip install --upgrade pip
          /tmp/v/bin/pip install -e ".[dev]"

      - name: Diagnostic — introspect seccomp API + direct self-test
        # Prints the python3-seccomp API surface and runs a direct filter self-test
        # (build+load via preexec_fn in a child that tries to connect). If the
        # egress tests below fail, this output shows exactly why. Non-fatal.
        continue-on-error: true
        run: |
          /tmp/v/bin/python - <<'PY'
          import seccomp, subprocess, sys
          print("seccomp module:", seccomp.__file__)
          print("dir(seccomp):", [x for x in dir(seccomp) if not x.startswith('_')])
          print("has Action:", hasattr(seccomp, "Action"))
          if hasattr(seccomp, "Action"):
              print("Action attrs:", [x for x in dir(seccomp.Action) if not x.startswith('_')])
          # Build a filter that denies connect, load via preexec_fn in a child.
          f = seccomp.SyscallFilter(defaction=seccomp.Action.ALLOW)
          try:
              f.add_rule(seccomp.Action.ERRNO, "connect")
              print("add_rule(Action.ERRNO, connect): OK")
          except Exception as e:
              print("add_rule failed:", type(e).__name__, e)
          code = "import socket; socket.create_connection(('127.0.0.1',1),timeout=2)"
          r = subprocess.run([sys.executable,"-c",code], preexec_fn=f.load,
                             capture_output=True, text=True, timeout=10)
          print("direct self-test child rc:", r.returncode, "(nonzero => connect BLOCKED)")
          print("  stderr:", (r.stderr or "").strip()[:160])

      - name: Run seccomp egress + fallback tests
        run: |
          /tmp/v/bin/python -m pytest tests/test_sandbox.py::TestSeccompEgress tests/test_sandbox.py::TestSeccompFallback -v

