name: CI

# Least-privilege default for every job; widen only where a job needs more
# (e.g. the `security` job writes SARIF to the Security tab).
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"

      - name: Ruff lint
        # Rule set lives in [tool.ruff.lint] of pyproject.toml (E,F,W + B,UP,C4).
        run: ruff check koboi/

      - name: Ruff format check
        run: ruff format --check koboi/

      - name: Type check with mypy
        run: mypy koboi/

  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write   # OIDC for Codecov (no token secret needed for public repos)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"

      - name: Run tests with coverage
        # The 90% floor is the unit-test baseline, enforced as a HARD gate on
        # Linux only: macOS skips the seccomp-only tests (Linux system package),
        # so its measured coverage is slightly lower and should not gate the
        # build. All platforms still run the tests. A regression below 90% on
        # Linux fails the job (pytest --cov-fail-under exits non-zero).
        run: pytest --tb=short -q --cov=koboi --cov-report=term-missing --cov-report=xml ${{ matrix.os == 'ubuntu-latest' && '--cov-fail-under=90' || '' }}

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          use_oidc: true   # OIDC auth (codecov deprecated tokenless uploads)
          # Never let an external upload outage turn the quality gate red.
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"
          pip install pip-audit bandit

      - name: Static security analysis (bandit)
        run: bandit -r koboi/ -c pyproject.toml

      - name: Dependency audit (pip-audit; fails on known vulnerabilities)
        # --strict: exit non-zero on known vulns OR audit errors — this is the
        # merge gate; vulns print to the job log. pip-audit has no native SARIF
        # format, so Security-tab alerting comes from Dependabot instead
        # (see .github/dependabot.yml — covers both pip + github-actions).
        #
        # Audit `pip freeze --exclude-editable`, NOT the live environment: koboi-agent
        # itself is editable-installed above, and pip-audit resolves every installed
        # package against the PyPI index. Right after a version bump, the new version
        # may not have propagated to PyPI yet (chicken-and-egg with release.yml, which
        # publishes on the same tag push) -- "Dependency not found on PyPI and could not
        # be audited". `--skip-editable` looks like the fix but isn't: --strict treats a
        # skipped package as a collection failure too, so it still fails. Excluding the
        # editable package from the frozen requirements list is the only combination that
        # keeps --strict protection for all *real* (third-party) dependencies.
        run: |
          pip freeze --exclude-editable > /tmp/audit-requirements.txt
          pip-audit --strict -r /tmp/audit-requirements.txt

  seccomp:
    # Validates HARD network isolation (sandbox.network_isolation: seccomp). The
    # libseccomp Python bindings are a SYSTEM package (not on PyPI), so use the
    # runner's system python3 + apt `python3-seccomp`. A venv with
    # --system-site-packages inherits the bindings; its interpreter ABI-matches
    # the system .so (both are the runner's python3).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install system python3-seccomp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-seccomp python3-venv

      - name: Verify seccomp importable (guard against a false-green skip)
        run: python3 -c "import seccomp; print('seccomp module:', seccomp.__file__)"

      - name: Install koboi [dev] in a venv that inherits system site-packages
        run: |
          python3 -m venv --system-site-packages /tmp/v
          /tmp/v/bin/pip install --upgrade pip
          /tmp/v/bin/pip install -e ".[dev]"

      - name: Run seccomp egress + fallback + fail-closed tests
        # TestSeccompEgress proves the HARD filter blocks python3 socket / bash
        # /dev/tcp / absolute-path interpreter / real outbound TCP at the syscall
        # layer. TestSeccompFallback covers the legacy soft-degrade back-compat.
        # TestSeccompInstallerFailClosed covers issue #51: the installer refuses to
        # load a default-ALLOW filter when a deny rule can't be added, and the
        # seccomp_strict opt-in fails closed at boot when bindings are missing.
        run: |
          /tmp/v/bin/python -m pytest tests/test_sandbox.py::TestSeccompEgress tests/test_sandbox.py::TestSeccompFallback tests/test_sandbox.py::TestSeccompInstallerFailClosed -v

      - name: Build Docker image (validates seccomp-builder stage + bindings smoke)
        # Issue #51: the Dockerfile now has a seccomp-builder stage that compiles
        # the libseccomp Python bindings from source for /usr/local/bin/python3.12,
        # then a `RUN python -c "import seccomp"` smoke check. Building the image
        # FAILS if the bindings don't compile or don't land. We don't push.
        run: docker build -t koboi-agent:seccomp-smoke .
