name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"
          pip install ruff "mypy~=1.19.1"

      - name: Ruff lint
        run: |
          ruff check koboi/ --select E,F,W --ignore E501,E402

      - name: Ruff format check
        run: |
          ruff format --check koboi/

      - name: Type check with mypy
        run: |
          mypy koboi/ --ignore-missing-imports --no-strict-optional

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"

      - name: Run tests with coverage
        run: |
          pytest --tb=short -q --cov=koboi --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui,api]"
          pip install pip-audit bandit

      - name: Dependency audit
        run: |
          pip-audit
        continue-on-error: true

      - name: Static security analysis
        run: |
          bandit -r koboi/ -c pyproject.toml

  seccomp:
    # Validates HARD network isolation (sandbox.network_isolation: seccomp). The
    # libseccomp Python bindings are a SYSTEM package (not on PyPI), so use the
    # runner's system python3 + apt `python3-seccomp`. A venv with
    # --system-site-packages inherits the bindings; its interpreter ABI-matches
    # the system .so (both are the runner's python3).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system python3-seccomp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-seccomp python3-venv

      - name: Verify seccomp importable (guard against a false-green skip)
        run: python3 -c "import seccomp; print('seccomp module:', seccomp.__file__)"

      - name: Install koboi [dev] in a venv that inherits system site-packages
        run: |
          python3 -m venv --system-site-packages /tmp/v
          /tmp/v/bin/pip install --upgrade pip
          /tmp/v/bin/pip install -e ".[dev]"

      - name: Diagnostic — probe seccomp action API + real-listener self-test
        # Definitively shows which add_rule(action, "connect") form works on this
        # python3-seccomp build, then runs a self-test against a REAL listener (so
        # "blocked" is meaningful, unlike a closed port). Non-fatal.
        continue-on-error: true
        run: |
          /tmp/v/bin/python - <<'PY'
          import errno, seccomp, socket, subprocess, sys, threading
          print("dir(seccomp):", [x for x in dir(seccomp) if not x.startswith('_')])
          print("=== action API probes (add_rule(action, 'connect')) ===")
          for name, factory in [
              ("seccomp.ERRNO(errno.EPERM)", lambda: seccomp.ERRNO(errno.EPERM)),
              ("seccomp.ERRNO (bare)",       lambda: seccomp.ERRNO),
              ("seccomp.KILL",               lambda: seccomp.KILL),
          ]:
              try:
                  act = factory()
                  f = seccomp.SyscallFilter(defaction=seccomp.ALLOW)
                  f.add_rule(act, "connect")
                  print(f"  {name}: OK  (act={act!r})")
              except Exception as e:
                  print(f"  {name}: {type(e).__name__}: {e}")
          # Self-test against a REAL listener using ERRNO(errno.EPERM).
          received, port, ready = [], [0], threading.Event()
          def _srv():
              s = socket.socket(); s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              s.bind(("127.0.0.1", 0)); s.listen(1); port[0] = s.getsockname()[1]; ready.set()
              s.settimeout(8)
              try:
                  c, _ = s.accept(); received.append(c.recv(64)); c.close()
              except socket.timeout:
                  received.append(b"<timeout>")
              s.close()
          threading.Thread(target=_srv, daemon=True).start(); ready.wait()
          f = seccomp.SyscallFilter(defaction=seccomp.ALLOW)
          f.add_rule(seccomp.ERRNO(errno.EPERM), "connect")
          code = f"import socket; c=socket.create_connection(('127.0.0.1',{port[0]}),timeout=3); c.send(b'X'); c.close()"
          r = subprocess.run([sys.executable, "-c", code], preexec_fn=f.load,
                             capture_output=True, text=True, timeout=10)
          print("=== ERRNO(errno.EPERM) self-test (real listener) ===")
          print("  child rc:", r.returncode, "| received:", received[0] if received else b"?")
          print("  -> egress", "BLOCKED" if not received or b"X" not in received[0] else "ALLOWED")
          print("  stderr:", (r.stderr or "").strip()[:200])
          PY

      - name: Run seccomp egress + fallback tests
        run: |
          /tmp/v/bin/python -m pytest tests/test_sandbox.py::TestSeccompEgress tests/test_sandbox.py::TestSeccompFallback -v

