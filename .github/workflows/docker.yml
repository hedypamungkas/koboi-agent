name: Docker

# Build & push the koboi server image to the GitHub Container Registry (ghcr.io).
#   - On PR (Dockerfile-relevant paths): build-only (no push) so Dockerfile
#     regressions are caught before a release.
#   - On tag v*: build an amd64 tar -> Trivy scan (fail on fixable HIGH/CRITICAL)
#     -> multi-arch (amd64 + arm64) push. Semver tags; `latest` only on
#     non-prereleases. Scanning before push prevents shipping a known-vulnerable
#     image (the image is published only if the scan passes).
# Public image; no secrets beyond the default GITHUB_TOKEN (packages: write).

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "examples/docker/**"
      - "koboi/**"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"

permissions:
  contents: read

jobs:
  build-and-push:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags + labels (semver; latest only on non-prerelease)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      # Scan target: a classic docker-format tar (manifest.json at root) so Trivy
      # can read it via --input. type=oci + provenance=true (the build-push-action
      # v7 default) exports a manifest-list/index artifact that Trivy rejects with
      # "manifest.json not found in tar" — so use type=docker with provenance
      # disabled for a deterministic single-image tar.
      - name: Build amd64 image to docker tar (scan target; not pushed yet)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          provenance: false
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (fail on fixable HIGH/CRITICAL)
        # ignore-unfixed: only block when a fix is available; unfixable findings
        # still appear in the scan log but don't gate the release. Drop the flag
        # to fail on all HIGH/CRITICAL regardless of fix availability.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          input: /tmp/image.tar
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  docker-build:
    # PR guard: build the Dockerfile (no push) so regressions are caught pre-release.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build (amd64, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
