agent:
  name: "anthropic-apikey-agent"
  description: "Agent using Anthropic API key authentication (usage-based)"
  system_prompt: |
    You are a helpful AI assistant powered by Claude.
  max_iterations: 10

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  auth_type: "api_key"
  api_key: "${ANTHROPIC_API_KEY:}"
  base_url: "${ANTHROPIC_BASE_URL:}"
  timeout: 120.0
  max_tokens: 4096

context:
  strategy: "noop"
