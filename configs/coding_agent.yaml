agent:
  name: "coding-agent"
  description: "Coding assistant with filesystem and shell tools"
  # act is REQUIRED: the default chat mode blocks every mutating tool
  # (write_file/edit_file/run_shell), so a coding agent cannot work without it.
  mode: "act"
  system_prompt: |
    You are a coding assistant. Help users write, debug, and understand code.
    Prefer edit_file (exact string replacement) over write_file when modifying
    existing files; use write_file only to create new files. For multi-line or
    multi-hunk edits, prefer apply_patch (a unified-diff patch). For large files,
    read a line range with read_file's offset/limit instead of the whole file.
    After each change, run run_typecheck (ruff/mypy) for precise file:line
    diagnostics, then run the project's tests with run_shell and iterate until
    they pass. Always explain what you're doing and why.
  max_iterations: 120

llm:
  provider: "openai"
  model: "${OPENAI_MODEL}"
  api_key: "${OPENAI_API_KEY}"
  base_url: "${OPENAI_BASE_URL:}"
  # temperature: 0.3          # Lower for deterministic code generation

tools:
  builtin: [list_files, read_file, edit_file, apply_patch, write_file, delete_file, run_shell, run_typecheck, grep_search, glob_find, git_status, git_log, git_diff, git_add, git_commit, git_checkout]
  defaults:
    timeout: 60
    max_output: 15000
  overrides:
    # Keys must be the registered tool name (run_shell, not "shell").
    run_shell:
      timeout: 600        # builds/test suites routinely exceed the 30s default
      max_output: 30000
    run_typecheck:
      checker: "ruff"     # ruff|mypy|pyright (override per-call with the `checker` arg)
      timeout: 120        # typecheckers can be slower than a shell one-liner
      max_output: 20000
    read_file:
      max_read_size: 100000
    git_status:
      timeout: 30
    git_log:
      timeout: 30
      max_log_count: 100
    git_diff:
      timeout: 30
  # disabled: [run_shell]   # example denylist: removes a tool from LLM view + execution

# Wave 3 "coding" strategy: old tool-result BODIES (file reads, test output)
# collapse to one-line stubs; the newest result per (tool, path) stays
# verbatim; the recent window is untouched. Falls back to plain truncation
# when stubbing alone can't fit the budget.
context:
  strategy: "coding"
  max_context_tokens: 100000
  keep_last: 40
  safety_margin: 8000
  # evict_min_chars: 200        # bodies <= this are never stubbed
  # keep_newest_per_key: 1      # newest N per (tool, path) kept verbatim

guardrails:
  input:
    detect_injection: true
    max_length: 20000
  output:
    detect_sensitive: true
  rate_limit:
    max_calls_per_session: 600
    max_calls_per_minute: 60

self_healing:
  # Degrade to a best-effort summary at the iteration cap instead of erroring
  # (works independently of self_healing.enabled).
  graceful_max_iter: true
  # Opt into the full self-healing loop to unlock run_typecheck's structured
  # signal: when enabled, a failing run_typecheck is parsed into file:line
  # diagnostics and the reflection critique names the first failing location
  # (error_kind="typecheck_failed") instead of the generic "try again" hint.
  # Requires a grounding_check output guardrail + handover.detection for the
  # full ladder; see configs/self_healing_demo.yaml.
  # enabled: true
  # triggers:
  #   tool_error:
  #     repeat_threshold: 2

policy:
  rules:
    - tool: "run_shell"
      pattern: "rm -rf /"
      action: "deny"
    - tool: "run_shell"
      pattern: "curl.*\\|.*bash"
      action: "deny"
    - tool: "delete_file"
      action: "confirm"

skills:
  search_paths:
    - "./skills"

tracing:
  provider: "langfuse"
  public_key: "${LANGFUSE_PUBLIC_KEY}"
  secret_key: "${LANGFUSE_SECRET_KEY}"
  base_url: "${LANGFUSE_BASE_URL:}"

harness:
  doom_loop:
    consecutive_identical_threshold: 4
    # repeating_pattern_window: 6
    # repeating_pattern_threshold: 2
    # enable_recovery: true
    # error_retry_threshold: 3
  telemetry: true
  carryover: true
  # carryover_limits:
  #   max_log_entries: 100
  #   max_goals: 15
  #   max_artifacts: 30
  #   max_verified: 30
