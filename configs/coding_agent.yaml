agent:
  name: "coding-agent"
  description: "Coding assistant with filesystem and shell tools"
  # act is REQUIRED: the default chat mode blocks every mutating tool
  # (write_file/edit_file/run_shell), so a coding agent cannot work without it.
  mode: "act"
  system_prompt: |
    You are a coding assistant. Help users write, debug, and understand code.
    Prefer edit_file (exact string replacement) over write_file when modifying
    existing files; use write_file only to create new files. For large files,
    read a line range with read_file's offset/limit instead of the whole file.
    After each change, run the project's tests with run_shell and iterate until
    they pass. Always explain what you're doing and why.
  max_iterations: 120

llm:
  provider: "openai"
  model: "${OPENAI_MODEL}"
  api_key: "${OPENAI_API_KEY}"
  base_url: "${OPENAI_BASE_URL:}"
  # temperature: 0.3          # Lower for deterministic code generation

tools:
  builtin: [list_files, read_file, edit_file, write_file, delete_file, run_shell, grep_search, glob_find, git_status, git_log, git_diff]
  defaults:
    timeout: 60
    max_output: 15000
  overrides:
    # Keys must be the registered tool name (run_shell, not "shell").
    run_shell:
      timeout: 600        # builds/test suites routinely exceed the 30s default
      max_output: 30000
    read_file:
      max_read_size: 100000
    git_status:
      timeout: 30
    git_log:
      timeout: 30
      max_log_count: 100
    git_diff:
      timeout: 30
  # disabled: [run_shell]   # example denylist: removes a tool from LLM view + execution

# smart_truncation is WRONG for coding: it keeps only system + first user +
# last N messages, silently dropping the agent's own recent file reads/edits.
# Plain truncation with a generous budget keeps the working set intact.
context:
  strategy: "truncation"
  max_context_tokens: 100000
  keep_last: 40
  safety_margin: 8000

guardrails:
  input:
    detect_injection: true
    max_length: 20000
  output:
    detect_sensitive: true
  rate_limit:
    max_calls_per_session: 600
    max_calls_per_minute: 60

self_healing:
  # Degrade to a best-effort summary at the iteration cap instead of erroring
  # (works independently of self_healing.enabled).
  graceful_max_iter: true

policy:
  rules:
    - tool: "run_shell"
      pattern: "rm -rf /"
      action: "deny"
    - tool: "run_shell"
      pattern: "curl.*\\|.*bash"
      action: "deny"
    - tool: "delete_file"
      action: "confirm"

skills:
  search_paths:
    - "./skills"

tracing:
  provider: "langfuse"
  public_key: "${LANGFUSE_PUBLIC_KEY}"
  secret_key: "${LANGFUSE_SECRET_KEY}"
  base_url: "${LANGFUSE_BASE_URL:}"

harness:
  doom_loop:
    consecutive_identical_threshold: 4
    # repeating_pattern_window: 6
    # repeating_pattern_threshold: 2
    # enable_recovery: true
    # error_retry_threshold: 3
  telemetry: true
  carryover: true
  # carryover_limits:
  #   max_log_entries: 100
  #   max_goals: 15
  #   max_artifacts: 30
  #   max_verified: 30
