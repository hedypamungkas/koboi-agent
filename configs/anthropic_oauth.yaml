agent:
  name: "anthropic-oauth-agent"
  description: "Agent using Anthropic OAuth token authentication (subscription-based)"
  system_prompt: |
    You are a helpful AI assistant powered by Claude.
  max_iterations: 10

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  auth_type: "oauth_token"
  auth_token: "${ANTHROPIC_AUTH_TOKEN:}"
  base_url: "${ANTHROPIC_BASE_URL:}"
  timeout: 120.0
  max_tokens: 4096

context:
  strategy: "noop"
