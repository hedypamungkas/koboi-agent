# Deep-research demo -- execution.mode: deep_research (W2).
#
# The agent plans a research workflow per query (plan -> search -> fetch -> assess
# coverage -> drill deeper -> synthesize a cited report). Set WEB_SEARCH_PROVIDER to
# firecrawl/brave (with an API key in .env) for live research; the default mock runs offline.
#
# Run:   koboi run configs/deep_research_demo.yaml -m "Research solid-state battery breakthroughs in 2026."

agent:
  name: "deep-research-agent"
  description: "Iterative, cited web research (deep_research mode)"
  system_prompt: "You plan and run iterative, cited web research."
  mode: act
  max_iterations: 20              # research nodes need more than the default 10

orchestration:
  enabled: true
  execution:
    mode: deep_research

research:
  max_depth: 3              # coverage-gated replan rounds
  max_searches: 50          # total across all depth rounds (7 nodes × ~5 searches + re-plan margin)
  max_fetches: 60
  coverage_threshold: 0.7   # stop iterating once coverage >= this
  citations: numbered
  persist_findings: ./research_findings.jsonl   # W3: dump findings for later corpus reuse

web:
  search:
    provider: ${WEB_SEARCH_PROVIDER:mock}
    max_results: 8
    # firecrawl:
    #   api_key: ${FIRECRAWL_API_KEY:}
    #   scrape_results: true   # search+fetch fusion (embed markdown into each result)
    # brave:
    #   api_key: ${BRAVE_API_KEY:}
    #   country: "US"
  fetch:
    provider: ${WEB_FETCH_PROVIDER:httpx}   # httpx (readability, default) or firecrawl (JS rendering)
    # firecrawl:
    #   api_key: ${FIRECRAWL_API_KEY:}
    #   only_main_content: true

llm:
  provider: openai
  model: ${OPENAI_MODEL:gpt-5.4}
  api_key: ${OPENAI_API_KEY:}
  base_url: ${OPENAI_BASE_URL:}

memory:
  backend: sqlite
  db_path: ./koboi_memory.db

sandbox:
  # 'restricted' (not 'passthrough') so POST /v1/jobs accepts deep_research jobs
  # (the autonomous-jobs gate refuses passthrough). Web tools are HTTP-only, so node
  # behavior is unchanged; this only tightens workspace isolation + unblocks jobs.
  backend: restricted
  workdir: ./workspace
