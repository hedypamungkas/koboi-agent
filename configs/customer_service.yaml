agent:
  name: "customer-service"
  description: "Customer service agent"
  system_prompt: |
    You are a helpful customer service agent. Answer customer questions about
    company policies, products, and services. Be empathetic and solution-oriented.
    If you don't know the answer, offer to escalate.
  max_iterations: 10

llm:
  provider: "openai"
  model: "${OPENAI_MODEL}"
  api_key: "${OPENAI_API_KEY}"
  base_url: "${OPENAI_BASE_URL:}"

tools:
  builtin: [calculator, web_search, memory_store, memory_recall]

context:
  strategy: "key_facts"
  max_context_tokens: 8000

rag:
  enabled: true
  chunker: "sentence"
  chunk_size: 400
  retriever: "keyword"
  top_k: 3
  augmentation: "on_the_fly"
  documents:
    - path: "./data/sample/company_policy.md"
    - path: "./data/sample/employee_handbook.md"
    - path: "./data/sample/product_catalog.md"

tracing:
  provider: "langfuse"
  public_key: "${LANGFUSE_PUBLIC_KEY}"
  secret_key: "${LANGFUSE_SECRET_KEY}"
  base_url: "${LANGFUSE_BASE_URL:}"

guardrails:
  input:
    detect_injection: true
    max_length: 5000
  output:
    detect_sensitive: true
