# Example eval suite configuration for koboi-agent benchmarking.
#
# Usage:
#   from koboi import KoboiAgent
#   from koboi.eval import EvalConfig, EvalRunner, EvalCase
#
#   agent = KoboiAgent.from_config("configs/sales_agent.yaml")
#   eval_config = EvalConfig.from_config(agent.config)
#   cases, scorers = await eval_config.build_suite("bfcl_simple")

agent:
  name: eval-runner
  description: "Evaluation runner configuration"

llm:
  provider: openai
  model: gpt-4o-mini

eval:
  threshold: 0.7
  parallel: false
  max_concurrency: 5

  # Default scorers for all suites
  scorers:
    - name: tool_usage
    - name: keyword_presence
    - name: output_length
    - name: cost
    - name: health_score

  suites:
    # BFCL: Tool Calling Accuracy
    - name: bfcl_simple
      framework: bfcl
      source: "./benchmarks/bfcl/simple.jsonl"
      scorers:
        - tool_calling_accuracy
        - cost
      max_cases: 50

    # RAGAS: RAG Quality (requires ragas package) -- suite entry removed: it referenced a
    # non-existent evals/rag_quality.yaml. Re-add when a YAML-cases RAG quality file exists
    # (the t.* evals use a different loader -- PythonTestLoader, not YAMLLoader).

    # Deep Research: structural quality (keyword_presence scorer checks for the ## Sources footer).
    # Run: koboi eval-test --config configs/deep_research_demo.yaml --suite deep_research_quality
    - name: deep_research_quality
      framework: yaml
      source: "./evals/deep_research_golden.yaml"
      scorers:
        - name: keyword_presence

    # GAIA: General Tasks (requires datasets package)
    - name: gaia_level1
      framework: gaia
      source: "gaia-benchmark/GAIA"
      scorers:
        - gaia_verification
        - cost
        - iteration_efficiency

    # SWE-bench: Coding Agent (requires datasets package)
    - name: swe_bench_coding
      framework: swe-bench
      source: "SWE-bench/SWE-bench_Verified"
      scorers:
        - patch_generation
        - cost
      max_cases: 10

    # Custom YAML eval cases
    - name: custom_sales
      framework: yaml
      source: "./evals/sales_cases.yaml"
      scorers:
        - tool_usage
        - keyword_presence
        - llm_judge

  regression:
    baseline_dir: "./eval_baselines"
    alert_on_regression: true
    regression_threshold: 0.05
