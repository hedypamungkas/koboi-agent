# docker-compose.yml — production self-host deployment for koboi-agent.
#
# Topology:
#   browser → CF edge → cloudflared → koboi:8080
#   browser → CF edge → cloudflared → langfuse-web:3000  (via koboi-net)
#   koboi   → langfuse-web:3000  (direct, internal koboi-net — no tunnel hop)
#
# Requires the shared 'koboi-net' network (create once):
#   docker network create koboi-net
# Then start Langfuse alongside this stack:
#   docker compose -f docker-compose.langfuse.yml up -d
#
# TLS is handled by Cloudflare; no certs needed on the VPS.
#
# Usage:
#   1. Generate an API key:
#        docker compose run --rm koboi koboi keys create --file /data/keys.json --label production
#   2. Set your LLM key + Cloudflare tunnel token:
#        export OPENAI_API_KEY=sk-...
#        export CLOUDFLARE_TUNNEL_TOKEN=eyJ...   # from the CF dashboard (Zero Trust → Tunnels)
#   3. Start:
#        docker compose up -d
#   4. Test (replace with your tunnel domain):
#        curl -N -H "Authorization: Bearer koboi_..." \
#          -H "Content-Type: application/json" \
#          -d '{"message":"hello"}' \
#          https://koboi.yourdomain.com/v1/chat/stream
#
# The koboi-data volume persists SQLite (memory, journal, jobs, ownership) +
# workspace dirs across container restarts. Resume works after restart.
#
# nginx alternative: if you prefer a local reverse proxy (no CF Tunnel), see
# nginx.conf in this repo and replace the cloudflared service below with the
# commented nginx block from the git history.

services:
  koboi:
    build: .
    container_name: koboi-agent
    restart: unless-stopped
    user: "1000:1000"            # H8: run as the non-root image user
    working_dir: /data           # relative artifacts (.logs) land in the writable volume, not root-owned /app
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - koboi-data:/data
      - ./configs:/app/configs:ro          # override agent config
      - ./data:/app/data:ro               # RAG documents
      - ./skills:/app/skills:ro           # Skills
      - ./mcp_servers:/app/mcp_servers:ro  # MCP servers
    environment:
      # --- Auth ---
      - KOBOI_API_KEYS_FILE=/data/keys.json
      # Or use env (comma-separated): KOBOI_API_KEYS=koboi_aaa,koboi_bbb
      # --- LLM ---
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4-mini}
      # --- Embeddings (optional dedicated provider, decoupled from chat) ---
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # --- Langfuse (self-hosted via docker-compose.langfuse.yml) ---
      # Keys are created in the Langfuse UI after first boot, then set in .env.
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-http://langfuse-web:3000}
      # --- Data paths ---
      - KOBOI_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: koboi-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      koboi:
        condition: service_healthy
    networks:
      - default
      - koboi-net   # reach langfuse-web:3000 for the second CF Tunnel hostname

networks:
  koboi-net:
    external: true   # shared with docker-compose.langfuse.yml

volumes:
  koboi-data:
    driver: local
