# RAG gold set over the Acme Corp corpus (data/sample/*.md).
#
# 40 factual retrieval cases + 10 gating negatives. Used by examples/28_rag_baseline.py:
#   - OFFLINE (default): deterministic recall@k / precision@k / hit@k via
#     metadata.{source_doc, key_facts} + gate_noise via needs_retrieval=false.
#   - LIVE (--mode live): RAGAS faithfulness/precision/recall over expected_answer +
#     context_docs (gold passage TEXT, per ragas_scorer.py convention).
#
# Notes:
#   - Uses `user_message:` (the YAMLLoader reads user_message, NOT input).
#   - source_doc matches Chunk.doc_id == file stem (product_catalog / company_policy / employee_handbook).
#   - key_facts are substrings guaranteed to appear in the source doc, so recall is
#     computable; they are the facts a correct answer depends on.

