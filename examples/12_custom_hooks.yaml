agent:
  name: "example-custom-hooks"
  description: "Agent demonstrating custom hook integration"
  system_prompt: |
    You are a helpful assistant that answers questions clearly.
    Use available tools when needed to provide accurate results.
  max_iterations: 8

llm:
  provider: "openai"
  model: "${OPENAI_MODEL}"
  api_key: "${OPENAI_API_KEY}"
  base_url: "${OPENAI_BASE_URL}"

tools:
  builtin: [calculate, memory_store, memory_recall]

context:
  strategy: "noop"
