# nginx reverse proxy for koboi-agent (optional / legacy).
#
# The default production deployment now uses Cloudflare Tunnel (docker-compose.yml).
# Use this file only if you prefer a self-managed reverse proxy instead of CF Tunnel.
#
# Key settings for SSE:
#   - proxy_buffering off: stream chunks immediately (don't buffer)
#   - proxy_read_timeout 300s: allow long-running agent turns
#   - X-Accel-Buffering: no already set by the app (defense-in-depth)
#
# M7: TLS is the DEFAULT -- Bearer tokens must not traverse cleartext. Provide
# certs at ./certs/fullchain.pem and ./certs/privkey.pem (see the docker-compose
# `certs` volume). For an HTTP-only local dev setup: comment out the :443 server
# block below AND remove the `return 301` line in the :80 block.

# H6: per-IP rate limit (http context -- this file is include'd into http{}).
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream koboi_backend {
    server koboi:8080;
    keepalive 32;
}

# M7: plaintext :80 keeps health probes open and redirects everything else to :443.
server {
    listen 80;
    location /healthz { proxy_pass http://koboi_backend; access_log off; }
    location /readyz { proxy_pass http://koboi_backend; access_log off; }
    location / { return 301 https://$host$request_uri; }
}

# M7: TLS-terminated :443 serves the API + security headers.
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 1m;  # H6: bound request bodies (app also caps at 64 KiB)

    # M7: security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SSE + REST API
    location /v1/ {
        limit_req zone=api burst=20 nodelay;  # H6: per-IP rate limit
        proxy_pass http://koboi_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-critical: no buffering, long timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket upgrade (if added later)
        proxy_set_header Upgrade $http_upgrade;
    }

    # Health endpoints (no auth, fast)
    location /healthz { proxy_pass http://koboi_backend; access_log off; }
    location /readyz { proxy_pass http://koboi_backend; access_log off; }
}
