# nginx reverse proxy for koboi-agent.
#
# Key settings for SSE:
#   - proxy_buffering off: stream chunks immediately (don't buffer)
#   - proxy_read_timeout 300s: allow long-running agent turns
#   - X-Accel-Buffering: no already set by the app (defense-in-depth)

# H6: per-IP rate limit (http context -- this file is include'd into http{}).
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream koboi_backend {
    server koboi:8080;
    keepalive 32;
}

server {
    listen 80;
    client_max_body_size 1m;  # H6: bound request bodies (app also caps at 64 KiB)
    # For TLS, uncomment:
    # listen 443 ssl http2;
    # ssl_certificate /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # return 301 https://$host$request_uri;  # redirect HTTP → HTTPS

    # SSE + REST API
    location /v1/ {
        limit_req zone=api burst=20 nodelay;  # H6: per-IP rate limit
        proxy_pass http://koboi_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-critical: no buffering, long timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket upgrade (if added later)
        proxy_set_header Upgrade $http_upgrade;
    }

    # Health endpoints (no auth, fast)
    location /healthz {
        proxy_pass http://koboi_backend;
        access_log off;
    }
    location /readyz {
        proxy_pass http://koboi_backend;
        access_log off;
    }
}
